services:
  localstack:
    # Real projects under ~/github pin 3.4 (Chapar-Tech, papt, website) to 4.0
    # (chapar-ai xpeeddating/smart-survey). 4.0 is the newest in use.
    image: localstack/localstack:4.0
    ports:
      - "4566:4566"
    environment:
      # Union of SERVICES the real projects enable.
      - SERVICES=dynamodb,s3,sqs,sns,events,ssm,iam,sts,apigateway,lambda,secretsmanager,cognito-idp
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ./localstack-init/init.sh:/etc/localstack/init/ready.d/init.sh
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      localstack:
        condition: service_healthy

volumes:
  localstack-data:
